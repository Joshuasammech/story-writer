<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Story Writer Bot</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f7f7f5;
    --surface:  #ffffff;
    --border:   #e5e5e2;
    --text:     #1a1a18;
    --muted:    #6b6b67;
    --accent:   #2563eb;
    --accent-h: #1d4ed8;
    --success:  #16a34a;
    --error:    #dc2626;
    --radius:   10px;
    --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .logo { font-size: 20px; }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
  header .badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 24px 64px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Input card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
  }

  .card h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    background: var(--bg);
    border-radius: 7px;
    padding: 3px;
    width: fit-content;
  }
  .tab {
    padding: 5px 14px;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all .15s;
  }
  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,.1);
  }

  /* URL groups */
  #url-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 12px;
  }

  .url-group {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .url-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .url-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .15s;
  }
  .url-row input:focus {
    border-color: var(--accent);
    background: var(--surface);
  }
  .url-row .url-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .4px;
    white-space: nowrap;
    min-width: 34px;
  }

  .remove-url-btn {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }
  .remove-url-btn:hover { background: #fef2f2; color: var(--error); border-color: #fecaca; }

  .group-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 2px;
  }

  .add-sheet-btn {
    font-size: 12px;
    font-weight: 500;
    color: #059669;
    background: transparent;
    border: 1px dashed #6ee7b7;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all .15s;
  }
  .add-sheet-btn:hover { background: #f0fdf4; }

  .remove-group-btn {
    font-size: 12px;
    color: var(--muted);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    transition: all .15s;
  }
  .remove-group-btn:hover { color: var(--error); }

  .url-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .add-url-btn {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: transparent;
    border: 1px dashed #bfdbfe;
    border-radius: 7px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .add-url-btn:hover { background: #eff6ff; }

  textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
    resize: vertical;
    min-height: 120px;
  }
  textarea:focus {
    border-color: var(--accent);
    background: var(--surface);
  }

  .btn {
    padding: 10px 20px;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-h); }
  .btn-primary:disabled {
    opacity: .55;
    cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }

  /* ── Status bar ── */
  #status-bar {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 7px;
    border: 1px solid var(--border);
  }
  #status-bar.visible { display: flex; }
  #status-bar.error    { color: var(--error);    border-color: #fecaca; background: #fef2f2; }
  #status-bar.done     { color: var(--success);  border-color: #bbf7d0; background: #f0fdf4; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Output cards ── */
  #output-area {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .story-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 10px;
  }
  .story-toolbar .story-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }
  .story-toolbar .actions { display: flex; gap: 8px; flex-shrink: 0; }

  .story-body {
    padding: 32px 40px;
    font-size: 15px;
    line-height: 1.75;
    min-height: 100px;
  }

  .story-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 20px 40px;
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Markdown styles ── */
  .story-body h1 {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 6px;
    letter-spacing: -.4px;
  }
  .story-body h2 {
    font-size: 17px;
    font-weight: 700;
    margin-top: 36px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
    color: var(--text);
  }
  .story-body h2:first-of-type { margin-top: 24px; }
  .story-body p { margin-bottom: 14px; }
  .story-body ul, .story-body ol { padding-left: 22px; margin-bottom: 14px; }
  .story-body li { margin-bottom: 4px; }
  .story-body strong { font-weight: 700; }
  .story-body em { font-style: italic; }
  .story-body hr {
    border: none;
    border-top: 2px solid var(--border);
    margin: 28px 0;
  }

  /* ── Cursor blink ── */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink .9s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<header>
  <span class="logo">📖</span>
  <h1>Story Writer Bot</h1>
  <span class="badge">Powered by Claude Sonnet 4.6</span>
  <a href="/logout" style="margin-left:auto;font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid #e2e8f0;background:transparent;color:#94a3b8;text-decoration:none;cursor:pointer;">Sign out</a>
</header>

<main>
  <!-- Input card -->
  <div class="card">
    <h2>Source Reports</h2>

    <div class="tabs">
      <button class="tab active" data-tab="url">Google Doc URLs</button>
      <button class="tab"        data-tab="text">Paste Text</button>
    </div>

    <div id="tab-url">
      <div id="url-list">
        <div class="url-group">
          <div class="url-row">
            <span class="url-label">Doc</span>
            <input type="text" class="doc-url primary"
              placeholder="https://docs.google.com/document/d/…"
              autocomplete="off" spellcheck="false"/>
          </div>
          <div class="group-footer">
            <button class="add-sheet-btn" onclick="addSheetRow(this)">+ Add Sheet URL</button>
          </div>
        </div>
      </div>
      <div class="url-actions" style="margin-top:10px">
        <button class="add-url-btn" onclick="addPersonGroup()">+ Add another person</button>
        <button class="btn btn-primary" id="generate-btn" onclick="generate()">
          <span>Generate</span>
        </button>
      </div>
      <p style="margin-top:12px;font-size:12px;color:var(--muted)">
        Each source must be set to <strong>Anyone with the link can view</strong>.
        Add a Sheet URL to combine both sources into one story.
      </p>
    </div>

    <div id="tab-text" style="display:none">
      <div style="display:flex;flex-direction:column;gap:10px;">
        <textarea id="doc-text" placeholder="Paste your report text here…"></textarea>
        <button class="btn btn-primary" id="generate-btn-text"
          onclick="generate()" style="align-self:flex-end">
          <span>Generate</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span class="spinner" id="spinner"></span>
    <span id="status-text">Ready</span>
  </div>

  <!-- Output area (multiple story cards) -->
  <div id="output-area"></div>
</main>

<script>
  // ── Tab switching ─────────────────────────────────────────────────────────────
  let activeTab = 'url';
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-url').style.display  = activeTab === 'url'  ? '' : 'none';
      document.getElementById('tab-text').style.display = activeTab === 'text' ? '' : 'none';
    });
  });

  // ── URL group management ──────────────────────────────────────────────────────
  function addPersonGroup() {
    const list = document.getElementById('url-list');
    const group = document.createElement('div');
    group.className = 'url-group';
    group.innerHTML = `
      <div class="url-row">
        <span class="url-label">Doc</span>
        <input type="text" class="doc-url primary"
          placeholder="https://docs.google.com/document/d/…"
          autocomplete="off" spellcheck="false"/>
      </div>
      <div class="group-footer">
        <button class="add-sheet-btn" onclick="addSheetRow(this)">+ Add Sheet URL</button>
        <button class="remove-group-btn" onclick="removeGroup(this)">✕ Remove</button>
      </div>
    `;
    list.appendChild(group);
    group.querySelector('input').focus();
    updateRemoveButtons();
  }

  function removeGroup(btn) {
    btn.closest('.url-group').remove();
    updateRemoveButtons();
  }

  function addSheetRow(btn) {
    const group = btn.closest('.url-group');
    // Only one sheet row per group
    if (group.querySelector('.sheet-row')) return;
    const row = document.createElement('div');
    row.className = 'url-row sheet-row';
    row.innerHTML = `
      <span class="url-label" style="color:#059669">Sheet</span>
      <input type="text" class="doc-url secondary"
        placeholder="https://docs.google.com/spreadsheets/d/…"
        autocomplete="off" spellcheck="false"/>
      <button class="remove-url-btn" onclick="removeSheetRow(this)" title="Remove sheet">×</button>
    `;
    // Insert before group-footer
    const footer = group.querySelector('.group-footer');
    group.insertBefore(row, footer);
    row.querySelector('input').focus();
    btn.style.display = 'none';
  }

  function removeSheetRow(btn) {
    const group = btn.closest('.url-group');
    btn.closest('.url-row').remove();
    group.querySelector('.add-sheet-btn').style.display = '';
  }

  function updateRemoveButtons() {
    const groups = document.querySelectorAll('#url-list .url-group');
    groups.forEach(group => {
      const removeBtn = group.querySelector('.remove-group-btn');
      if (groups.length > 1) {
        if (!removeBtn) {
          const footer = group.querySelector('.group-footer');
          const btn = document.createElement('button');
          btn.className = 'remove-group-btn';
          btn.textContent = '✕ Remove';
          btn.onclick = () => removeGroup(btn);
          footer.appendChild(btn);
        }
      } else {
        if (removeBtn) removeBtn.remove();
      }
    });
  }

  // ── State ─────────────────────────────────────────────────────────────────────
  let isGenerating = false;

  function setStatus(msg, cls = '') {
    const bar  = document.getElementById('status-bar');
    const text = document.getElementById('status-text');
    const spin = document.getElementById('spinner');
    bar.className = 'visible ' + cls;
    text.textContent = msg;
    spin.style.display = (cls === 'done' || cls === 'error') ? 'none' : '';
  }

  function setGenerating(on) {
    isGenerating = on;
    ['generate-btn', 'generate-btn-text'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = on;
    });
  }

  // ── Create a story card ───────────────────────────────────────────────────────
  function createStoryCard(label, index) {
    const area = document.getElementById('output-area');
    const card = document.createElement('div');
    card.className = 'story-card';
    card.id = `story-card-${index}`;
    card.innerHTML = `
      <div class="story-toolbar">
        <span class="story-label">${escHtml(label)}</span>
        <div class="actions" id="story-actions-${index}" style="display:none">
          <button class="btn btn-ghost" onclick="copyStory(${index})">Copy</button>
          <button class="btn btn-ghost" onclick="downloadStoryMd(${index})">↓ Markdown</button>
          <button class="btn btn-ghost" onclick="downloadStoryPdf(${index})">↓ PDF</button>
          <button class="btn btn-ghost" onclick="downloadStoryDocx(${index})">↓ Word</button>
        </div>
      </div>
      <div class="story-status" id="story-status-${index}">
        <span class="spinner"></span>
        <span>Waiting…</span>
      </div>
      <div class="story-body" id="story-body-${index}" style="display:none"></div>
    `;
    area.appendChild(card);
    return card;
  }

  // ── Generate one story via SSE ────────────────────────────────────────────────
  function generateOne(sources, index, label) {
    return new Promise((resolve) => {
      const statusEl = document.getElementById(`story-status-${index}`);
      const bodyEl   = document.getElementById(`story-body-${index}`);
      const actionsEl = document.getElementById(`story-actions-${index}`);

      let markdown = '';
      let cursorEl = null;

      function updateStatus(msg) {
        statusEl.innerHTML = `<span class="spinner"></span><span>${escHtml(msg)}</span>`;
      }

      function showBody() {
        statusEl.style.display = 'none';
        bodyEl.style.display = '';
      }

      function render() {
        bodyEl.innerHTML = marked.parse(markdown);
        if (cursorEl) {
          cursorEl = document.createElement('span');
          cursorEl.className = 'cursor';
          bodyEl.appendChild(cursorEl);
        }
      }

      function addCursor() {
        showBody();
        cursorEl = document.createElement('span');
        cursorEl.className = 'cursor';
        bodyEl.appendChild(cursorEl);
      }

      function removeCursor() {
        if (cursorEl) { cursorEl.remove(); cursorEl = null; }
      }

      function markDone() {
        removeCursor();
        showBody();
        actionsEl.style.display = '';
        // Store markdown on element for download
        bodyEl.dataset.markdown = markdown;
        resolve();
      }

      function markError(msg) {
        removeCursor();
        statusEl.style.display = 'none';
        bodyEl.style.display = '';
        bodyEl.innerHTML = `<p style="color:var(--error);padding:0 0 20px">${escHtml(msg)}</p>`;
        bodyEl.dataset.markdown = '';
        resolve();
      }

      updateStatus('Fetching…');

      fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sources }),
      }).then(resp => {
        if (!resp.ok) {
          resp.json().catch(() => ({})).then(err => {
            markError(err.error || `Server error ${resp.status}`);
          });
          return;
        }
        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let   buffer  = '';

        function pump() {
          reader.read().then(({ done, value }) => {
            if (done) {
              // Stream closed — finalize card regardless of whether 'done' SSE arrived
              if (markdown) {
                removeCursor(); showBody();
                actionsEl.style.display = '';
                bodyEl.dataset.markdown = markdown;
              } else {
                markError('Server closed the connection without a response.');
              }
              resolve(); return;
            }

            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split('\n\n');
            buffer = parts.pop();

            for (const part of parts) {
              const lines = part.split('\n');
              let eventName = '', dataStr = '';
              for (const line of lines) {
                if (line.startsWith('event: ')) eventName = line.slice(7).trim();
                if (line.startsWith('data: '))  dataStr   = line.slice(6).trim();
              }
              if (!eventName) continue;

              let payload = '';
              try { payload = JSON.parse(dataStr).data; } catch { payload = dataStr; }

              switch (eventName) {
                case 'status':       updateStatus(payload); break;
                case 'writing_start': addCursor(); break;
                case 'token':
                  if (!markdown) showBody();
                  markdown += payload;
                  render();
                  break;
                case 'done':         markDone(); return;
                case 'error':        markError(payload); return;
              }
            }
            pump();
          }).catch(err => {
            markError('Network error: ' + err.message);
          });
        }
        pump();
      }).catch(err => {
        markError('Network error: ' + err.message);
      });
    });
  }

  // ── Main generate ─────────────────────────────────────────────────────────────
  async function generate() {
    if (isGenerating) return;

    const isUrl = activeTab === 'url';

    // Collect jobs — each job is one story with possibly multiple sources
    const jobs = [];
    if (isUrl) {
      const groups = document.querySelectorAll('#url-list .url-group');
      groups.forEach((group, i) => {
        const primary = group.querySelector('.primary')?.value.trim();
        const secondary = group.querySelector('.secondary')?.value.trim();
        const sources = [];
        if (primary) sources.push({ type: 'url', content: primary });
        if (secondary) sources.push({ type: 'url', content: secondary });
        if (sources.length > 0) {
          jobs.push({ sources, label: `Person ${i + 1}` });
        }
      });
      if (jobs.length === 0) {
        setStatus('Please enter at least one Google Doc URL.', 'error');
        document.getElementById('status-bar').classList.add('visible');
        return;
      }
    } else {
      const text = document.getElementById('doc-text').value.trim();
      if (!text) {
        setStatus('Please paste some text.', 'error');
        document.getElementById('status-bar').classList.add('visible');
        return;
      }
      jobs.push({ sources: [{ type: 'text', content: text }], label: 'Story' });
    }

    // Clear previous output
    document.getElementById('output-area').innerHTML = '';
    setGenerating(true);
    setStatus(`Generating ${jobs.length} ${jobs.length === 1 ? 'story' : 'stories'}…`);

    // Create all cards upfront
    jobs.forEach((job, i) => createStoryCard(job.label, i));

    // Generate sequentially
    for (let i = 0; i < jobs.length; i++) {
      const job = jobs[i];
      setStatus(`Writing story ${i + 1} of ${jobs.length}…`);
      // Update card label with index indicator
      const card = document.getElementById(`story-card-${i}`);
      const labelEl = card.querySelector('.story-label');
      labelEl.textContent = jobs.length > 1 ? `Story ${i + 1} of ${jobs.length}` : 'Case Report';

      await generateOne(job.sources, i, job.label);
    }

    setStatus(`Done! ${jobs.length} ${jobs.length === 1 ? 'story' : 'stories'} generated.`, 'done');
    setGenerating(false);
  }

  // ── Per-card download helpers ─────────────────────────────────────────────────
  function getStoryMarkdown(index) {
    const bodyEl = document.getElementById(`story-body-${index}`);
    return bodyEl ? (bodyEl.dataset.markdown || '') : '';
  }

  function copyStory(index) {
    const md = getStoryMarkdown(index);
    navigator.clipboard.writeText(md).then(() => {
      const btn = document.querySelector(`#story-actions-${index} .btn-ghost`);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  function downloadStoryMd(index) {
    const md = getStoryMarkdown(index);
    const blob = new Blob([md], { type: 'text/markdown' });
    Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: `story-${index + 1}.md`,
    }).click();
  }

  function downloadStoryPdf(index) {
    const el = document.getElementById(`story-body-${index}`);
    html2pdf().set({
      margin: [15, 20],
      filename: `story-${index + 1}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    }).from(el).save();
  }

  async function downloadStoryDocx(index) {
    const md = getStoryMarkdown(index);
    const resp = await fetch('/download/docx', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: md }),
    });
    if (!resp.ok) { alert('Failed to generate Word document.'); return; }
    const blob = await resp.blob();
    Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: `story-${index + 1}.docx`,
    }).click();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Enter key on first URL input
  document.querySelector('.doc-url.primary').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });
</script>
</body>
</html>
